spring.application.name=the-full-api
server.port=8080

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/the_full?serverTimezone=Asia/Seoul&characterEncoding=UTF-8

spring.datasource.username=
spring.datasource.password=

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true

mybatis.mapper-locations=classpath:mybatis-mapper/**/*.xml
mybatis.type-aliases-package=com.example.demo.dao

spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

google.cloud.vision.credentials.path=

documentai.project.id=
documentai.location=
#documentai.processor.id=

openai.api.key=

logging.level.root=info
logging.level.com.example=debug
logging.level.org.springframework.jdbc=debug
logging.level.org.mybatis=debug
logging.level.org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerMapping=DEBUG

# 비밀 정보는 아래 파일로 분리
spring.config.import=optional:classpath:application-secret-local.properties

file.upload-dir=src/main/resources/static/image/

kakao.rest-api-key=

# ERP 문의 웹훅(수신) 설정
# 값이 비어 있으면 시크릿 검증을 생략합니다.
erp.webhook.secret=

# 라우팅 기본 우선순위: user_id > position_type > department
erp.contact.routing.priority=user_id,position_type,department

# 기본 라우팅 대상(쉼표 구분). 필요 시 운영 환경에서만 설정하세요.
erp.contact.routing.user-ids=
erp.contact.routing.position-types=
erp.contact.routing.departments=

# 내부 연동 전용 시크릿(미설정 시 localhost만 허용)
internal.api.secret=
